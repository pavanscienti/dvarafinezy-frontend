<script>
	var imageViewer = null;

	var docId = location.hash.replace(/^#/, '');

	function loadContentData() {
		var params = { "option": 'getContentData', "_id": docId};
		doAPIRequest("GET", '/vengine/fms/TrainingModule', params, function (json) {
			if (json && json.status_code == '200') {
				// $("#view_content_data > div").text(json.data);
				renderContentData(json.data, docId);
			} else {
				// alert(json.status_txt);
			}
		});
	}

	function doAPIRequest(method, url, params, callback, dataType) {	
		var reqHeader = {};
		if(localStorage && localStorage.token){
			reqHeader['token'] = localStorage.token;
		}
		var ajaxReq = {
			url: url,
			type: method,
			headers: reqHeader,	    
			cached: false,
			success: function(response, status, xhr) {
				if(callback != null) {
					callback(response, status, xhr);
				} 					        
			},
			error: function(response) {
				if(callback != null) {
					callback(response);
				}
			}
		};
			
		if(dataType == 'json') {
			ajaxReq.dataType = 'json';
			ajaxReq.contentType = 'application/json; charset=utf-8';
			if(params) ajaxReq.data = (typeof params === 'string') ? params : JSON.stringify(params);
		} else if(params) {
			ajaxReq.data = params;
		}
		$.ajax(ajaxReq);
	}

	function getUrlBLOB(fileId) {
		return fileId ? "/vengine/cms/base64?option=base64ImgCloud&image=1&name=" + fileId : "/fms/images/spiner.gif";
	}

	function showImageViewer(url) {
		// imageViewer.show(url, url);
		var image = new Image();
		image.src = url;
		var viewer = new Viewer(image, {
			loop: false,
			backdrop: false,
			navbar: false,
			hidden: function () { viewer.destroy(); },
		});
		viewer.show();
	}
