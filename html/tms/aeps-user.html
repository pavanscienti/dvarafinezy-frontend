<div class="container-fluid">
	<div class="row">					    		
		<div class="col-xs-12">
			<div>
				<h3 class="pull-left" style="margin-top: 0px;">AEPS User Management</h3>		    		
   				<div class="pull-right form-inline" >
					 <a class="cur-pointer"><span style="font-size: 24px;" class="fa fa-plus-square" data-toggle="modal" data-target="#user-modal" "></span></a>
				</div>
			</div>
		</div>
	</div>
	<hr style="margin-top: 0px;">
	<div class="row">
		<div class="col-xs-12">
			<div class="table-responsive">
				<table id="tbl-user" class="table table-striped table-bordered">
					<thead>
						<tr>
							<th>S.No</th>
							<th>Emp Code</th>							
							<th>CSR Id</th>						
							<th>Device Code</th>
							<th>Name</th>							
							<th>Location</th>
							<th>Terminal Id</th>
							<th>Status</th>
							<!-- <th>Action</th> -->							
						</tr>
					</thead>
					<tbody>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</div>

<!-- Modal -->
<div id="user-modal" class="modal fade" role="dialog"  data-backdrop="static" data-keyboard="false" >
	<div class="modal-dialog">
	    <!-- Modal content-->
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal">&times;</button>
				<h4 class="modal-title">Add/Update User</h4>
			</div>
			<div class="modal-body">
				<div class="container-fluid">
					<form role="form" id="user-form">	
						<input type="hidden" name="action" value="add" />				
						<div class="row">
  							<div class="col-xs-12 col-sm-6 col-md-6">
	 							<div class="form-group">	 							
							      	<label for="emp_id" class="control-label">Employee Name</label>							      	
								    <select name="emp_id" id="emp_id" class="form-control input-sm" required>
								    	<option value="">--Select--</option>								    	
								    </select>
	  								<div class="help-block with-errors"></div>
		  						</div>
		  					</div>
		  					<div class="col-xs-12 col-sm-6 col-md-6">
	 							<div class="form-group">	 							
							      	<label for="location" class="control-label">Location</label>							      	
								    <input type="text" name="location" id="location" class="form-control input-sm" pattern="[0-9a-zA-Z,-]{3,60}" title="This field should not be left blank." data-error-msg="accept only Alphanumeric" required>
	  								<div class="help-block with-errors"></div>
		  						</div>
		  					</div>
  						</div>
  						<div class="row">
  							<div class="col-xs-12 col-sm-6 col-md-6">
	 							<div class="form-group">	 							
							      	<label for="csr_id" class="control-label">CSR Id</label>							      	
								    <input type="text" name="csr_id" value="" id="csr_id" class="form-control input-sm" pattern="[0-9a-zA-Z]{10}" title="This field should not be left blank." data-error-msg="accept only Alphanumeric" required>
	  								<div class="help-block with-errors"></div>	  									
		  						</div>
		  					</div>
		  					<div class="col-xs-12 col-sm-6 col-md-6">
	 							<div class="form-group">	 							
							      	<label for="csr_password" class="control-label">CSR Password</label>							      	
								    <input type="password" name="csr_password" value="" id="csr_password" class="form-control input-sm" pattern="[0-9a-zA-Z]{4,8}" title="This field should not be left blank." data-error-msg="accept only alphanumeric" required>
	  								<div class="help-block with-errors"></div>	  									
		  						</div>
		  					</div>
						</div>
						<div class="row">
  							<div class="col-xs-12 col-sm-6 col-md-6">
	 							<div class="form-group">	 							
							      	<label for="device_code" class="control-label">Device Code</label>							      	
								    <input type="text" name="device_code" value="" id="device_code" class="form-control input-sm" pattern="[0-9A-Z]{8}" title="This field should not be left blank." data-error-msg="accept only A-Z, 0-9" required>
	  								<div class="help-block with-errors"></div>	  									
		  						</div>
		  					</div>
  							<div class="col-xs-12 col-sm-6 col-md-6" >
	 							<div class="form-group">	 							
							      	<label for="terminal_id" class="control-label">Terminal Id</label>							      	
								    <input type="text" name="terminal_id" value="" id="termianl_id" class="form-control input-sm" pattern="[0-9]{14,16}" title="This field should not be left blank." data-error-msg="accept only numeric" required>
	  								<div class="help-block with-errors"></div>	  									
		  						</div>
		  					</div>		  					
						</div>
					 							
						<div class="row">
							<div class="col-xs-12" >
								<div class="form-group">
						      		<button type="submit" class="btn btn-primary btn-sm pull-right" >Save</button>									
  								</div>
  							</div>
 						</div>
					</form>
				</div>
			</div>
	      	<!-- <div class="modal-footer">
	        	<button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
	      	</div> -->
	   	</div>
  	</div>
</div>

<script type="text/javascript" src="js/aeps-user.js" ></script>
