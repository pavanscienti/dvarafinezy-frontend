<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
  		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Statement</title>
	</head>
	<body>
		<div class="row">					    		
		    <div class="col-xs-12">
		    	<div>
		    		<h3 class="pull-left" style="margin-top: 10px;">Bank Statement</h3>
		    		
    				<div class="pull-right form-inline" >
    					<div class="input-group" >						    
    						<label>Trans Type : &nbsp;&nbsp;</label>
						    <input type="radio" name="trxn_type" value="C" class="form-control-inline" checked>Credit &nbsp;
						    <input type="radio" name="trxn_type" value="D" class="form-control-inline" >Debit &nbsp;
						    <input type="radio" name="trxn_type" value="B"  class="form-control-inline" >Both &nbsp;						    						    						    
						</div>
    				
    					<div class="input-group input-daterange  datepicker" data-provide="datepicker" data-date-end-date="now" data-date-autoclose="true" data-date-format="yyyy-mm-dd">
						    <div class="input-group-addon">
						        <span class="glyphicon glyphicon-calendar"></span>
						    </div>
						    <input type="text" name="date_from" id="date_from" class="form-control" >
						    <div class="input-group-addon"> to </div>
						    <input type="text" name="date_to" id="date_to" class="form-control" >						    						    
						</div>
						<button class="btn btn-sm btn-primary" onclick="getStatement()">View</button>
						<button class="btn btn-sm btn-primary" onclick="download()">Download</button>
					</div>	
		    	</div>
		    </div>
		</div>
		<div class="row">					    		
		    <div class="col-xs-12">
		    	<hr>
		    	<table class="table table-striped" >
		    		 <tr> <td>Account No </td><td><span id="account-no"></span></td> <td>Statement Date&nbsp;&nbsp;</td><td> <span id="stmt-date-range"></span></td> </tr>
		    	</table>
		    	<hr>
		    </div>
		</div>
		<div class="row">
			<div class="col-xs-12">
		      	<div class="table-responsive">
		      		<table id="tbl-stmt" class="table table-striped table-bordered">
		      			<thead>
		      				<tr>
		      					<th class="text-center">S.No</th>
								<th class="text-center">Trxn Date</th>
								<th class="text-center">Trxn Id</th>
								<th class="text-center">Description</th>
								<th class="text-center">Credit</th>
								<th class="text-center">Debit</th>
								<th class="text-center">Availabe</th>
		      				</tr>
		      			</thead>
		      			<tbody>
		      				<tr><td class="text-center" colspan="7">Click view button to see the transactions!</td></tr>
		      			</tbody>
		      		</table> 
		      	</div>
	      	</div>
		</div>
	</body>
	<script type="text/javascript" src="js/bankstmt.js"></script>
</html>
