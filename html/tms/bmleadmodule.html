<div class="container-fluid">		
	<div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12">
            <div>
				<h4 class="pull-left" style="margin-top: 0px;">Branch Manager Leads Module</h4>
            </div>
        </div>
		<div class="col-xs-12 col-sm-12 col-md-12">
			<div>
				<!-- <h4 class="pull-left" style="margin-top: 0px;">Branch Manager Leads Module</h4> -->
				<div class="pull-right form-inline" >
                    <div class="input-group input-group-sm" style="padding-right: 10px;">	 							
                        <span class="input-group-addon"><b>Mobile No:</b></span>							      	
                        <input type="text" name="bm_mobile_no" id="bm_mobile_no" class="form-control input-sm" pattern="[0-9a-zA-Z]{10,10}" maxlength="10">	
                        <span class="glyphicon form-control-feedback" aria-hidden="true"></span>
                        <div class="help-block with-errors"></div>	  									
                    </div>
                    <div class="input-group input-daterange  datepicker" data-provide="datepicker" data-date-end-date="now" data-date-autoclose="true" data-date-format="yyyy-mm-dd">
                        <div class="input-group-addon">
                            <span class="glyphicon glyphicon-calendar"></span>
                        </div>
                        <input type="text" name="date_from" id="date_from" class="form-control" >
                        <div class="input-group-addon"> to </div>
                        <input type="text" name="date_to" id="date_to" class="form-control" >						    						    
                    </div>
                    <div class="input-group input-group-sm" >
						<span class="input-group-addon"><b>Allocated:</b></span>
						<select id="input_filter_allocated_to" class="form-control input-sm" style="min-width:50px;">
							<option value="no">No</option>
							<option value="yes">Yes</option> 							
						</select>
					</div>
                    <div style="float:right;margin:6px 0px 0px 5px;">
                        <button class="btn btn-sm btn-primary" onclick="getLeadFulfillments()">View</button>
                    </div>					
				</div>
			</div>
		</div>
	</div>
	<hr>
	<div class="row">					    		
		<div class="col-xs-12 col-sm-12 col-md-12">
			<div>
				<div style="display:none;" id="error" class="error-content text-danger error-alert alert alert-danger col-xs-12"></div>
				<div style="display:none;" id="success" class="error-content text-success success-alert alert alert-success col-xs-12"></div>   		
			</div>
		</div>
	</div>
			
	<div class="row" id="payments">
		<div class="col-xs-12">		    			    			    	
			<div class="table-responsive">
				<table id="fulfillmentTable" class="table table-striped table-bordered ">
					<thead>
						<tr>								
							<th></th>
							<th>Lead Id</th>
							<th>Creation Date</th>
							<th>Customer Name</th>
							<th>Mobile No</th>
							<th>Product Requested</th>
							<th>Pre Product Approved</th>	
							<th>Allocated to</th>
							<th>Allocate</th>	
						</tr>
					</thead>
					<tbody>							
					</tbody>
				</table>
			</div>
		</div>	
	</div>
	<div class="row">		
		<div class="col-xs-12 controls text-right"> 
			<button id="btn-create" type="button" class="btn btn-primary btn-sm" disabled onclick="updateLeadFulfilment()">Create</button>
		</div>
	</div>
</div>

<!-- OTP verification modal -->
<div id="otpVerificationModal" class="modal fade" role="dialog">
	<div class="modal-dialog">
		<!-- Modal content-->
		<div class="col-md-11 modal-content">
			<div class="modal-body">
				<button type="button" class="close" data-dismiss="modal">&times;</button>
				<div class="container-fluid">  						
					<form role="form" id="otpVerificationForm" class="form-horizontal">  
						<input type="hidden" name="action" id="action">
						<input type="hidden" name="option" id="option">
						<input type="hidden" name="otp_auth_id" id="otp_auth_id">						  							
						<div class="row">
							<div class="col-xs-12">
								<div class="form-group has-feedback" style="padding-right: 10px;">	 							
									<label for="otp_pin" class="control-label"><span class="small">Enter OTP : </span></label>							      	
									<input type="text" name="otp_pin" id="otp_pin" class="form-control" pattern="[0-9a-zA-Z]{5,8}" title="This field should not be left blank." data-error-msg="Enter valid OTP pin?" required>	
									<span class="glyphicon form-control-feedback" aria-hidden="true"></span>
									<div class="help-block with-errors"></div>	  									
								</div>
							</div>
						</div>  							
						<div class="form-group">
							<div class="col-xs-12">		                  			 
								<button type="submit" class="btn btn-primary btn-xs pull-right" >Verify OTP</button>	                  		  		
							</div>
						</div>
						
					</form>
				</div>
				
			</div>		      	
		</div>
	</div>
</div>

<script type="text/javascript" src="js/bmleadmodule.js"></script>
