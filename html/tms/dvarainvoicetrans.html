
<dialog class="container-fluid popup-dialog" id="uploadFileFormModal">
	<div class="modal-dialog">
		<div class="modal-content">	
			<div class="modal-header text-center">
				
				<h4 class="modal-title">Upload Transaction File</h4>
			</div>									
			<div class="modal-body">
                <form role="form" id="uploadFileForm" class="form-horizontal">
                    <div class="container-fluid row">								    			    			    	
                        <div class="col-xs-4">
                            <div class="form-group has-feedback" style="padding-right: 10px;">	 							
                                <label for="year" class="control-label"><span class="small">Year : </span></label>							      	
                                <input type="text" name="year" id="year" class="form-control" title="This field should not be left blank." data-error-msg="Enter valid year" required>	
                                <span class="glyphicon form-control-feedback" aria-hidden="true"></span>
                                <div class="help-block with-errors"></div>	  									
                            </div>
                        </div>
                        <div class="col-xs-4">
                            <div class="form-group has-feedback" style="padding-right: 10px;">	 							
                                <label for="month" class="control-label"><span class="small">Month : </span></label>							      	
                                <input type="text" name="month" id="month" class="form-control" title="This field should not be left blank." data-error-msg="Enter valid Month" required>	
                                <span class="glyphicon form-control-feedback" aria-hidden="true"></span>
                                <div class="help-block with-errors"></div>	  									
                            </div>
                        </div>
                        <div class="col-xs-4">
                            <div id="select_file" class="form-group has-feedback" style="padding-right: 10px;">	 							
                                <label for="file" class="control-label"><span class="small">File : </span></label>							      	
                                <input type="file" name="file" id="vendor_trans_file" class="form-control" title="This field should not be left blank." data-error-msg="Enter valid file" required>	
                                <span class="glyphicon form-control-feedback" aria-hidden="true"></span>
                                <div class="help-block with-errors"></div>	  									
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-xs-12">		                  			 
                                <button type="submit" class="btn btn-primary btn-xs pull-right" onclick="uploadfile()">Upload</button>	                  		  		
                            </div>
                        </div>
                    </div>
                </form>
			</div>				
		</div>
	</div>						
</dialog>
