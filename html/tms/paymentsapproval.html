
<div class="container-fluid">		
	<div class="row">
		<div class="col-xs-12 col-sm-12 col-md-12">
			<div>
				<h4 class="pull-left" style="margin-top: 0px;">Payments Approval Pending</h4>
				<div class="pull-right form-inline" >
					<div class="input-group input-group-sm" >
						<span class="input-group-addon"><b>Payment Category:</b></span>
						<select id="input_filter_payment_category" class="form-control input-sm" style="min-width:50px;" onchange="getBatchList()">
							<option value="ALL">ALL</option>								
						</select>
					</div>
					<button class="btn btn-sm btn-primary" onclick="getBatchList()">View</button>
				</div>
			</div>
		</div>
	</div>
	<hr>
	<div class="row">					    		
		<div class="col-xs-12 col-sm-12 col-md-12">
			<div>
				<div style="display:none;" id="error" class="error-content text-danger error-alert alert alert-danger col-xs-12"></div>
				<div style="display:none;" id="success" class="error-content text-success success-alert alert alert-success col-xs-12"></div>   		
			</div>
		</div>
	</div>
			
	<div class="row" id="payments">
		<div class="col-xs-12">		    			    			    	
			<div class="table-responsive">
				<table id="paymentsTable" class="table table-striped table-bordered ">
					<thead>
						<tr>								
							<th></th>
							<th>Batch Id</th>
							<th>Payment details</th>
							<th>Created On</th>	
							<th>Status</th>
							<th>Amount</th>	
							<th>Action</th>
						</tr>
					</thead>
					<tbody>							
					</tbody>
				</table>
			</div>
		</div>	
	</div>
	<div class="row">		
		<div class="col-xs-12 controls text-right">
			<button id="btn-cancell" type="button" class="btn btn-primary btn-sm" disabled onclick="authenticateApprovePayment(false)">Cancel</button> 
			<button id="btn-approve" type="button" class="btn btn-primary btn-sm" disabled onclick="authenticateApprovePayment(true)">Approve</button>
			<button id="btn-changepayment" type="button" class="btn btn-primary btn-sm" disabled data-toggle="modal" data-target="#changePaymentModal">Change Payment Mode</button>
		</div>
	</div>
</div>

<!-- OTP verification modal -->
<div id="otpVerificationModal" class="modal fade" role="dialog">
	<div class="modal-dialog">
		<!-- Modal content-->
		<div class="col-md-11 modal-content">
			<div class="modal-body">
				<button type="button" class="close" data-dismiss="modal">&times;</button>
				<div class="container-fluid">  						
					<form role="form" id="otpVerificationForm" class="form-horizontal">  
						<input type="hidden" name="action" id="action">
						<input type="hidden" name="option" id="option">
						<input type="hidden" name="otp_auth_id" id="otp_auth_id">						  							
						<div class="row">
							<div class="col-xs-12">
								<div class="form-group has-feedback" style="padding-right: 10px;">	 							
									<label for="otp_pin" class="control-label"><span class="small">Enter OTP : </span></label>							      	
									<input type="text" name="otp_pin" id="otp_pin" class="form-control" pattern="[0-9a-zA-Z]{5,8}" title="This field should not be left blank." data-error-msg="Enter valid OTP pin?" required>	
									<span class="glyphicon form-control-feedback" aria-hidden="true"></span>
									<div class="help-block with-errors"></div>	  									
								</div>
							</div>
						</div>  							
						<div class="form-group">
							<div class="col-xs-12">		                  			 
								<button type="submit" class="btn btn-primary btn-xs pull-right" >Verify OTP</button>	                  		  		
							</div>
						</div>
						
					</form>
				</div>
				
			</div>		      	
		</div>
	</div>
</div>

<div id="changePaymentModal" class="modal fade" role="dialog">
	<div class="modal-dialog">
		<div class="modal-content">	
			<!-- <div class="modal-header text-center">
				<button type="button" class="close"  data-dismiss="modal">&times;</button>
				<h4 class="modal-title">Payment Mode</h4>
			</div> -->
			<div class="modal-body">
				<button type="button" class="close" data-dismiss="modal">&times;</button>
				<div class="container-fluid">  						
					<form role="form" id="changePaymentForm" class="form-horizontal">  						  							
						<div class="row">
							<div class="col-xs-12">
								<div class="form-group has-feedback" style="padding-right: 10px;">	 							
									<label for="payment_mode" class="control-label" style="margin-bottom: 10px;"><span class="small">Select Payment Mode : </span></label><br/>							      	
									<select class="form-control" name="payment_mode" id="payment_mode">
										<option value="NEFT">NEFT</option>
										<option value="IMPS">IMPS</option>
									</select>	
									<!-- <span class="glyphicon form-control-feedback" aria-hidden="true"></span>
									<div class="help-block with-errors"></div>	  									 -->
								</div>
							</div>
						</div>  							
						<div class="form-group">
							<div class="col-xs-12">		                  			 
								<button type="submit" class="btn btn-primary btn-xs pull-right" >Change</button>	                  		  		
							</div>
						</div>						
					</form>
				</div>				
			</div>									
			<!-- <div class="modal-body">
				<div class="container-fluid row">
					<div class="form-group">
						<select class="form-select" aria-label="Default select example" name="payment_mode" id="payment_mode">
							<option value="NEFT">NEFT</option>
							<option value="IMPS">IMPS</option>
						</select>
					</div>							    			    			    	
					<div class="form-group">
						<div class="col-xs-12">		                  			 
							<button type="submit" class="btn btn-primary btn-xs pull-right" onclick="changePayment()" >Change</button>	                  		  		
						</div>
					</div>
				</div>
			</div>				 -->
		</div>
	</div>
</div>
		
<dialog class="container-fluid popup-dialog" id="paymentDetailsView" >
	<div class="modal-dialog">
		<div class="modal-content">	
			<div class="modal-header text-center">
				<button type="button" class="close"  onclick="togglePopup(false)">&times;</button>
				<h4 class="modal-title">Payment Details</h4>
			</div>									
			<div class="modal-body">
				<div class="container-fluid row">								    			    			    	
					<div class="table-responsive">
						<table id="paymentDetailsViewTable" class="table table-striped table-bordered ">
							<thead>								
							</thead>
							<tbody>							
							</tbody>
						</table>
					</div>
				</div>
			</div>				
		</div>
	</div>						
</dialog>
