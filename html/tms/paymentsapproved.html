<div class="container-fluid">
	<div class="row">
		<div class="col-xs-12 col-sm-12 col-md-12">
			<div>
				<h4 class="pull-left" style="margin-top: 0px;">Payments Approved</h4>
				<div class="pull-right form-inline" >
					<div class="input-group input-group-sm" >
						<span class="input-group-addon"><b>Payment Category:</b></span>
						<select id="input_filter_payment_category" class="form-control input-sm" style="min-width:50px;" onchange="getBatchList()">
							<option value="ALL">ALL</option>								
						</select>
					</div>
					<button class="btn btn-sm btn-primary" onclick="getBatchList()">View</button>
				</div>
			</div>
		</div>
	</div>
	<hr>
	<div class="row">					    		
		<div class="col-xs-12 col-sm-12 col-md-12">
			<div>
				<div style="display:none;" id="error" class="error-content text-danger error-alert alert alert-danger col-xs-12"></div>
				<div style="display:none;" id="success" class="error-content text-success success-alert alert alert-success col-xs-12"></div>   		
			</div>
		</div>
	</div>
			
	<div class="row" id="payments">
		<div class="col-xs-12">		    			    			    	
			<div class="table-responsive">
				<table id="paymentsTable" class="table table-striped table-bordered ">
					<thead>							
					</thead>
					<tbody>							
					</tbody>
				</table>
			</div>
		</div>	
		<div class="col-xs-12 text-right">
			<ul class="pagination" id="table_page_no">
				<li><a class="cur-pointer" id="btn_next_page" onclick="showRecords(-1)" >&laquo;</a></li>
				<li><a class="cur-pointer" id="current_page_no">1</a></li>
				<li><a class="cur-pointer" id="btn_prev_page" onclick="showRecords(1)">&raquo;</a></li>
			</ul>
		</div>		
	</div>	
</div>	
<dialog class="container-fluid popup-dialog" id="paymentDetailsView" >
	<div class="modal-dialog">
		<div class="modal-content">	
			<div class="modal-header text-center">
				<button type="button" class="close"  onclick="togglePopup(false)">&times;</button>
				<h4 class="modal-title">Payment Details</h4>
			</div>									
			<div class="modal-body">
				<div class="container-fluid row">							    			    			    	
					<div class="table-responsive">
						<table id="paymentDetailsViewTable" class="table table-striped table-bordered ">
							<thead>								
							</thead>
							<tbody>							
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>						
</dialog>
<script type="text/javascript" src="js/approved.js"></script>
