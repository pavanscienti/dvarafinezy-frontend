<div class="container-fluid">
	<div class="row">					    		
		<div class="col-xs-12">
			<div>
				<h3 style="margin-top: 0px;">Issues Management</h3>
				<div class="pull-left">					
					<div class="input-group input-group-sm">
	   					<label class="radio-inline">
					      <input type="radio" value="returns" name="payment_issue_type" onclick="paymentIssueTypeChanged()" checked />Returns
					    </label>
					    <label class="radio-inline">
					      <input type="radio" value="failures" name="payment_issue_type" onclick="paymentIssueTypeChanged()" /> Failures
					    </label>
					    <label class="radio-inline">
					      <input type="radio" value="inprogress" name="payment_issue_type" onclick="paymentIssueTypeChanged()" /> In Progress
					    </label>
					</div>
				</div>
				
										    		
   				<div class="pull-right form-inline" >	   				
   					<div class="payment-returns-view input-group input-group-sm" >
   						<span class="input-group-addon"><span class="glyphicon glyphicon-list"></span></span>
	   					<select name="retunrs-status" id="retunrs-status" class="form-control input-sm" onchange="getReturns()">
	   						<option value="">All</option>
	   						<option value="Open" selected="selected">Open</option>
	   						<!-- <option value="Bank request sent">Bank request sent</option> -->
	   						<!-- <option value="Recovery">Recovery</option> -->
	   						<option value="Verified">Verified</option>
	   						<!-- <option value="Completed">Completed</option> -->
	   						<option value="Closed">Closed</option>
   						</select>
   					</div>
   					
   					<div class="payment-returns-view input-group input-daterange  datepicker" data-provide="datepicker" data-date-end-date="now" data-date-autoclose="true" data-date-format="yyyy-mm-dd">
					    <span class="input-group-addon"><span class="glyphicon glyphicon-calendar"></span></span>
					    <input type="text" name="date_from" id="date_from" class="form-control input-sm" >
					    <span class="input-group-addon"> to </span>
					    <input type="text" name="date_to" id="date_to" class="form-control input-sm" >						    						    
					</div>
					<button class="payment-returns-view btn btn-sm btn-primary" onclick="getReturns()">View</button>
					<button id="btn-create-new-batch" class="payment-returns-view btn btn-sm btn-primary" onclick="createNewBatch()">Create New Batch</button>
					<!-- <a class="cur-pointer" onclick="getReturns()"><span style="font-size: 24px;" class="fa fa-eye" ></span></a> -->					
				</div>				
			</div>
		</div>
	</div>
	<hr>
	<!--  Display the batch payment details -->
	<div class="row payment-returns-view">					    		
		<div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
			<div class="table-responsive">
				<table id="tbl-returns" class="table table-striped table-bordered">
					<thead>
						<tr>
							<th align="center" nowrap>S.No</th>
							<th align="center" nowrap>Date</th>
							<th align="center" nowrap>Details</th>							
							<th align="center" nowrap>Amount</th>
							<th align="center" nowrap>PoNum</th>
							<th align="center" nowrap>UTR No</th>
							<th align="center" nowrap>Return Type</th>
							<th align="center" nowrap>Status</th>
							<th align="center" nowrap>Action</th>
						</tr>
					</thead>
					<tbody>						
					</tbody>
				</table>		
			</div>
		</div>
	</div>
	
	<div class="row payment-failure-view">					    		
		<div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
			<div class="table-responsive">
				<table id="tbl-failures" class="table table-striped table-bordered">
					<thead>
						<tr>
							<th align="center">S.No</th>
							<th align="center" nowrap>Disb Date</th>
							<th align="center" nowrap>Created Date</th>
							<th align="center" nowrap>NEFT Processed Time</th>							
							<th align="center" nowrap>Branch</th>
							<th align="center" nowrap>Customer Name</th>
							<th align="center" nowrap>Customer No</th>
							<th align="center" nowrap>Loan Account No</th>			
							<th align="center" nowrap>Account No</th>
							<th align="center" nowrap>IFSC Code</th>											
							<th align="center" nowrap>Amount</th>
							<th align="center" nowrap>PoNum</th>
							<th align="center" nowrap>UTR No</th>
							<th align="center" nowrap>Status</th>
							<th align="center" nowrap>Action</th>
						</tr>
					</thead>
					<tbody>						
					</tbody>
				</table>		
			</div>
		</div>
	</div>
	
	<div class="row payment-failure-view">		
		<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 controls text-right">
			<button id="btn-recheck" type="button" class="btn btn-primary btn-sm" disabled onclick="reCheckAllStatus()">Re-Check Status</button>
		</div>
	</div>
		
</div>

<!-- Modal -->
<div id="cust-details-view-modal" class="modal fade" role="dialog"  data-backdrop="static" data-keyboard="false" >
	<div class="modal-dialog">
	    <!-- Modal content-->
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal">&times;</button>
				<h4 class="modal-title">Add/Update User</h4>
			</div>
			<div class="modal-body">
				<div class="container-fluid">
					
				</div>
			</div>
	      	<!-- <div class="modal-footer">
	        	<button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
	      	</div> -->
	   	</div>
  	</div>
</div>

</div>

<script type="text/javascript" src="js/returns-mgmt.js" ></script>
