<div id="loginContainer" class="mainbox col-md-5 col-md-offset-3 col-sm-8 col-sm-offset-2">
	<div class="panel panel-default">
		<div class="panel-heading">
			<div class="panel-title">Sign In</div>
		</div>
		<div style="padding-top:30px" class="panel-body">
			<div style="display:none;" id="login-error" class="login-error error-alert alert alert-danger col-sm-12">
			</div>
			<form class="form-horizontal" role="form" onsubmit="return doLogin()">
				<div style="margin-bottom: 25px" class="input-group">
					<span class="input-group-addon"><i class="glyphicon glyphicon-user"></i></span>
					<input id="login-username" name="username" type="text" class="form-control" name="username" value=""
						placeholder="username" required />
				</div>
				<div style="margin-bottom: 25px" class="input-group">
					<span class="input-group-addon"><i class="glyphicon glyphicon-lock"></i></span>
					<input id="login-password" name="password" type="password" class="form-control" name="password"
						value="" placeholder="password" required />
				</div>
				<div style="margin-top:10px" class="form-group">
					<div class="col-sm-12 controls text-center">
						<button type="submit" id="btn-login" class="btn btn-primary"
							style="width: 150px;">Login</button>
					</div>
				</div>

				<div class="col-sm-12 controls text-center">
					<p>or </p>
				</div>



				<div style="margin-top:10px" class="form-group">
					<div class="col-sm-12 controls text-center ">


						<button type="button" class="login-with-google-btn g-signin2" onclick="return doSSOLogin()">
							Sign in with Google
						</button>

						
					</div>

					<div id="result"></div>


				</div>


			</form>

		</div>
	</div>
</div>
<script src="js/user-login.js"></script>
