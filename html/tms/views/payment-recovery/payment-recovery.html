<div class="container-fluid">
	<div class="row">					    		
		<div class="col-xs-12">
			<div>
				<div class="pull-left">					
					<h4 style="margin-top: 0px;">Payment Recovery</h4>
				</div>										    		
   				<div class="pull-right form-inline" >	   				
   					<div class="payment-returns-view input-group input-group-sm" >
   						<span class="input-group-addon"> Status</span>
	   					<select name="recovery_status" id="recovery_status" class="form-control input-sm" onchange="reloadTable()">
	   						<option value="Payment Recovery Pending,Payment Recovery Initiated,Payment Recovered,Payment Recovery Cancelled">All</option>
	   						<option value="Payment Recovery Pending" selected>Recovery Pending</option>
                            <option value="Payment Recovery Initiated">Recovery Initiated</option>
                            <option value="Payment Recovered">Recovered</option>
                            <option value="Payment Recovery Cancelled">Recovery Cancelled</option>
   						</select>
   					</div>   					
   					<div class="payment-returns-view input-group input-daterange  datepicker" data-provide="datepicker" data-date-end-date="now" data-date-autoclose="true" data-date-format="yyyy-mm-dd">
					    <span class="input-group-addon"><span class="glyphicon glyphicon-calendar"></span></span>
					    <input type="text" name="date_from" id="date_from" class="form-control input-sm" >
					    <span class="input-group-addon"> to </span>
					    <input type="text" name="date_to" id="date_to" class="form-control input-sm" >						    						    
					</div>
					<button class="payment-returns-view btn btn-sm btn-primary" onclick="reloadTable()">View</button>
				</div>				
			</div>
		</div>
	</div>
	<hr>
	<!--  Display the batch payment details -->
	<div class="row payment-returns-view">					    		
		<div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">
			<div class="table-responsive">
				<table id="tbl_trxns" class="table table-striped table-bordered">
					<thead>
						<tr>
							<th class="nowrap text-center" nowrap>S.No</th>
							<th class="nowrap text-center" nowrap>Date Time</th>
                            <th class="nowrap text-center" nowrap>Disbursement Date</th>
							<th class="nowrap text-center" nowrap>Branch Name</th>
							<th class="nowrap text-center" nowrap>URN</th>
							<th class="nowrap text-center" nowrap>Name</th>
							<th class="nowrap text-center" nowrap>Loan Account No</th>
                            <th class="nowrap text-center" nowrap>Amount</th>
							<th class="nowrap text-center" nowrap>Bank Account No</th>
							<th class="nowrap text-center" nowrap>IFSC Code</th>
                            <th class="nowrap text-center" nowrap>UTR</th>
							<th class="nowrap text-center" nowrap>Status</th>                            
							<th class="nowrap text-center" nowrap>Disbursement Cancelled By Name</th>
                            <th class="nowrap text-center" nowrap>Disbursement Cancelled Reason</th>
							<th class="nowrap text-center" nowrap>Action</th>
						</tr>
					</thead>
					<tbody>						
					</tbody>
				</table>		
			</div>
		</div>
	</div>		
</div>


<script type="text/javascript" src="views/payment-recovery/payment-recovery.js" ></script>
